{% if error %}
<div class="rounded-lg border border-amber-300 bg-amber-50 px-4 py-2.5 text-sm text-amber-800">{{ error }}</div>
{% else %}
<p class="text-sm text-brand-blueink">Applies to <strong>{{ count }}</strong> user{{ "s" if count != 1 }}{% if sample %} · previewing as {{ sample.full_name }}{% endif %}</p>
{% if sample %}
  <iframe sandbox title="Signature preview" class="mt-3 w-full h-44 rounded-lg border border-brand-gray/40 bg-white" srcdoc="{{ rendered }}"></iframe>
  {% if count %}
  <button class="mt-3 inline-flex items-center rounded-lg bg-brand-blue px-3.5 py-2 text-sm font-medium text-brand-white hover:bg-brand-blueink transition-colors"
          hx-post="/signatures/apply" hx-include="#sig-form" hx-target="#sig-preview" hx-swap="innerHTML"
          hx-confirm="Apply this signature to {{ count }} user(s)? It overwrites their current Gmail signature.">Apply to {{ count }} user{{ "s" if count != 1 }}</button>
  {% endif %}
{% else %}
  <p class="mt-2 text-sm text-brand-gray">No active users match this scope.</p>
{% endif %}
{% endif %}
