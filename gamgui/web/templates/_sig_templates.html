<div class="space-y-3">
  {% if error %}
  <div class="rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-sm text-amber-800">{{ error }}</div>
  {% endif %}
  {% if saved %}
  <div class="rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 text-sm text-emerald-800">Saved “{{ saved }}”.</div>
  {% endif %}

  {% if templates %}
  <ul class="space-y-2">
    {% for t in templates %}
    <li class="flex items-center justify-between gap-2 rounded-lg border border-brand-gray/30 px-3 py-2">
      <span class="min-w-0 truncate text-sm font-medium text-brand-black">{{ t.name }}</span>
      <span class="flex shrink-0 items-center gap-3">
        <button type="button" class="text-xs font-medium text-brand-blueink hover:underline"
                data-body="{{ t.body }}" onclick="sigLoadTemplate(this)">Load</button>
        <button class="text-xs text-red-600 hover:underline"
                hx-post="/signatures/templates/delete" hx-vals='{"name": {{ t.name | tojson }}}'
                hx-target="#sig-templates" hx-swap="innerHTML"
                hx-confirm="Delete the saved template “{{ t.name }}”?">Delete</button>
      </span>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="text-sm text-brand-gray">No saved templates yet.</p>
  {% endif %}

  <form class="flex items-center gap-2 pt-1"
        hx-post="/signatures/templates/save" hx-include="#sig-form"
        hx-target="#sig-templates" hx-swap="innerHTML">
    <input type="text" name="name" maxlength="60" placeholder="Save current as…"
           class="min-w-0 flex-1 rounded-lg border border-brand-gray/60 bg-brand-white px-3 py-1.5 text-sm focus:border-brand-blue focus:outline-none">
    <button type="submit"
            class="inline-flex shrink-0 items-center rounded-lg border border-brand-blue px-3 py-1.5 text-sm font-medium text-brand-blue hover:bg-brand-blue hover:text-brand-white transition-colors">Save</button>
  </form>
</div>
