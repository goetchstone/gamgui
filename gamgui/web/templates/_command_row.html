<li class="copy-wrap flex items-start gap-2 border-t border-brand-gray/10 py-1" title="{{ c.raw_syntax }}">
  <span class="mt-1 inline-block h-2 w-2 shrink-0 rounded-full {{ {'read':'bg-emerald-500','change':'bg-brand-blue','destructive':'bg-red-500'}[c.risk_label] }}"></span>
  <div class="min-w-0 flex-1">
    <p class="truncate text-brand-black">{{ c.name }}</p>
    {% if c.description %}<p class="truncate text-xs text-brand-gray">{{ c.description }}</p>{% endif %}
  </div>
  <input type="hidden" value="{{ c.raw_syntax }}" />
  {% if c.buildable %}
  <button class="mt-0.5 shrink-0 rounded bg-brand-blue px-2 py-0.5 text-xs font-medium text-brand-white hover:bg-brand-blueink transition-colors"
          hx-get="/builder/command/{{ c.id }}" hx-target="#cmd-form" hx-swap="innerHTML">Build</button>
  {% else %}
  <button class="mt-0.5 shrink-0 rounded border border-brand-gray/40 px-2 py-0.5 text-xs text-brand-blueink hover:bg-paper transition-colors" onclick="copyEl(this)">Copy</button>
  {% endif %}
</li>
