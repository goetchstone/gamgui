{% if items %}
<ul>{% for c in items %}{% include "_command_row.html" %}{% endfor %}</ul>
{% if has_prev or has_next %}
<div class="flex items-center justify-between py-1 text-xs">
  <button class="rounded border border-brand-gray/40 px-2 py-0.5 text-brand-blueink hover:bg-paper disabled:opacity-30"
          hx-get="/builder/catalog/section?area={{ area | urlencode }}&category={{ category | urlencode }}&subcategory={{ subcategory | urlencode }}&page={{ page - 1 }}"
          hx-target="closest .leaf" hx-swap="innerHTML" {{ 'disabled' if not has_prev }}>← Prev</button>
  <span class="text-brand-gray">{{ page }} · {{ total }}</span>
  <button class="rounded border border-brand-gray/40 px-2 py-0.5 text-brand-blueink hover:bg-paper disabled:opacity-30"
          hx-get="/builder/catalog/section?area={{ area | urlencode }}&category={{ category | urlencode }}&subcategory={{ subcategory | urlencode }}&page={{ page + 1 }}"
          hx-target="closest .leaf" hx-swap="innerHTML" {{ 'disabled' if not has_next }}>Next →</button>
</div>
{% endif %}
{% else %}
<p class="py-1 text-xs text-brand-gray">No commands.</p>
{% endif %}
