{% if delegates %}
<ul class="space-y-2">
  {% for d in delegates %}
  <li class="flex items-center justify-between text-sm border-b border-brand-gray/20 pb-2">
    <span class="text-brand-black">{{ d }}</span>
    <button class="text-xs text-red-700 hover:underline"
            hx-post="/users/delegate/remove" hx-target="#delegates" hx-swap="innerHTML"
            hx-vals='{"email": {{ email | tojson }}, "delegate": {{ d | tojson }} }'>Remove</button>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="text-sm text-brand-gray">No delegates.</p>
{% endif %}
<form class="mt-3 flex gap-2" hx-post="/users/delegate/add" hx-target="#delegates" hx-swap="innerHTML">
  <input type="hidden" name="email" value="{{ email }}" />
  <input type="email" name="delegate" required placeholder="delegate@domain.com"
         class="flex-1 rounded-lg border border-brand-gray/60 bg-brand-white px-3 py-2 text-sm text-ink placeholder:text-brand-gray focus:border-brand-blue focus:outline-none focus:ring-2 focus:ring-brand-blue/30" />
  <button class="inline-flex items-center rounded-lg border border-brand-blue/60 px-3 py-2 text-sm font-medium text-brand-blueink hover:bg-brand-blue/5 transition-colors" type="submit">Add</button>
</form>
