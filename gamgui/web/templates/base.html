<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}GamGUI — Console{% endblock %}</title>

  <!-- Type: Source Serif 4 / Source Sans 3 are the open-source twins of
       Minion Pro / Myriad Pro (same foundry lineage). System serif/sans fall back if offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#141414",        // near-black body text (brand black is #000000)
            paper: "#FAF9F6",      // warm off-white page
            brand: {
              black: "#000000",
              white: "#FFFFFF",
              gray: "#B2B4BB",     // warm gray
              blue: "#69829E",     // slate blue
              blueink: "#52647B",  // darker slate for text/hover contrast on white
            },
          },
          fontFamily: {
            serif: ['"Source Serif 4"', "Minion Pro", "Georgia", "serif"],
            sans: ['"Source Sans 3"', "Myriad Pro", "-apple-system", "BlinkMacSystemFont", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    :root { color-scheme: light; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    /* Tracked caps label. */
    .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.68rem; font-weight: 600; }
    .wordmark { text-transform: uppercase; letter-spacing: 0.22em; }
    /* Global indeterminate loading bar (shown during HTMX requests + page navigations). */
    #loadbar { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 60; overflow: hidden; opacity: 0; transition: opacity .15s; pointer-events: none; }
    #loadbar.on { opacity: 1; }
    #loadbar::before { content: ""; position: absolute; height: 100%; width: 35%; background: #69829E; animation: lbslide 1s ease-in-out infinite; }
    @keyframes lbslide { 0% { left: -35%; } 50% { left: 50%; } 100% { left: 100%; } }
    .spinner { display: inline-block; width: 0.9rem; height: 0.9rem; border: 2px solid rgba(105,130,158,.3); border-top-color: #69829E; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="h-full bg-paper text-ink font-sans">
  <div id="loadbar"></div>
  <div class="min-h-full">
    <header class="border-b border-brand-gray/40 bg-brand-white/80 backdrop-blur">
      <div class="mx-auto max-w-5xl px-6 py-4 flex items-center gap-4">
        <a href="/" class="wordmark font-serif text-lg text-brand-black">GamGUI</a>
        <span class="h-4 w-px bg-brand-gray/60"></span>
        <span class="eyebrow text-brand-blueink">Console</span>
        <nav class="ml-auto text-sm flex items-center gap-5 text-brand-blueink/80">
          <a class="hover:text-brand-black transition-colors" href="/">Home</a>
          <a class="hover:text-brand-black transition-colors" href="/users">Users</a>
          <a class="hover:text-brand-black transition-colors" href="/groups">Groups</a>
          <a class="hover:text-brand-black transition-colors" href="/reports">Reports</a>
        </nav>
      </div>
    </header>
    <main class="mx-auto max-w-5xl px-6 py-10">
      {% block content %}{% endblock %}
    </main>
    <footer class="mx-auto max-w-5xl px-6 py-8 text-xs text-brand-gray">
      GamGUI — a local admin console for Google Workspace
    </footer>
  </div>
  <script>
    // Copy the text of the code/input inside the clicked button's .copy-wrap.
    function copyEl(btn) {
      var wrap = btn.closest(".copy-wrap") || btn.parentElement;
      var src = wrap && wrap.querySelector("code, pre, input");
      if (!src) return;
      var text = src.tagName === "INPUT" ? src.value : src.innerText;
      function done() {
        var prev = btn.textContent;
        btn.textContent = "Copied";
        setTimeout(function () { btn.textContent = prev; }, 1200);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { legacyCopy(text); done(); });
      } else {
        legacyCopy(text);
        done();
      }
    }
    function legacyCopy(text) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta);
    }

    // Global loading bar: visible during HTMX requests and full-page navigations.
    (function () {
      var bar = document.getElementById("loadbar");
      var pending = 0;
      function show() { if (bar) bar.classList.add("on"); }
      function hide() { if (bar) bar.classList.remove("on"); }
      document.body.addEventListener("htmx:beforeRequest", function () { pending++; show(); });
      document.body.addEventListener("htmx:afterRequest", function () { pending = Math.max(0, pending - 1); if (pending === 0) hide(); });
      document.body.addEventListener("htmx:responseError", hide);
      document.addEventListener("click", function (e) {
        var a = e.target.closest && e.target.closest("a[href]");
        if (!a) return;
        var href = a.getAttribute("href") || "";
        if (a.target === "_blank" || href.charAt(0) === "#" || href.indexOf("://") >= 0) return;
        show();  // full-page nav — cleared automatically when the new page loads
      }, true);
    })();
  </script>
</body>
</html>
