<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Saybrook Home — Console{% endblock %}</title>

  <!-- Type: Source Serif 4 / Source Sans 3 are the open-source twins of the brand's
       Minion Pro / Myriad Pro (same foundry lineage). System serif/sans fall back if offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#141414",        // near-black body text (brand black is #000000)
            paper: "#FAF9F6",      // warm off-white page
            sh: {
              black: "#000000",
              white: "#FFFFFF",
              gray: "#B2B4BB",     // Pantone 421 C
              blue: "#69829E",     // Pantone 2165 C
              blueink: "#52647B",  // darker slate for text/hover contrast on white
            },
          },
          fontFamily: {
            serif: ['"Source Serif 4"', "Minion Pro", "Georgia", "serif"],
            sans: ['"Source Sans 3"', "Myriad Pro", "-apple-system", "BlinkMacSystemFont", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    :root { color-scheme: light; }
    body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    /* Tracked caps label, echoing the style guide's caption treatment. */
    .eyebrow { text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.68rem; font-weight: 600; }
    .wordmark { text-transform: uppercase; letter-spacing: 0.22em; }
  </style>
</head>
<body class="h-full bg-paper text-ink font-sans">
  <div class="min-h-full">
    <header class="border-b border-sh-gray/40 bg-sh-white/80 backdrop-blur">
      <div class="mx-auto max-w-5xl px-6 py-4 flex items-center gap-4">
        <a href="/" class="wordmark font-serif text-lg text-sh-black">Saybrook&nbsp;Home</a>
        <span class="h-4 w-px bg-sh-gray/60"></span>
        <span class="eyebrow text-sh-blueink">Console</span>
        <nav class="ml-auto text-sm flex items-center gap-5 text-sh-blueink/80">
          <a class="hover:text-sh-black transition-colors" href="/">Home</a>
        </nav>
      </div>
    </header>
    <main class="mx-auto max-w-5xl px-6 py-10">
      {% block content %}{% endblock %}
    </main>
    <footer class="mx-auto max-w-5xl px-6 py-8 text-xs text-sh-gray">
      Saybrook Home · 2 Main Street, Old Saybrook, CT
    </footer>
  </div>
</body>
</html>
