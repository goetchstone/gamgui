<div class="rounded-xl border border-red-300 bg-red-50 p-4">
  <p class="text-sm font-medium text-red-800">{{ decision.summary }}</p>
  {% if decision.affected %}
  <ul class="mt-2 text-sm text-red-700 list-disc pl-5">
    {% for t in decision.affected %}<li>{{ t }}</li>{% endfor %}
  </ul>
  {% endif %}
  {% for w in decision.warnings %}<p class="mt-1 text-xs text-red-700">{{ w }}</p>{% endfor %}
  <div class="mt-3 flex gap-2">
    <button class="inline-flex items-center rounded-lg bg-red-700 px-3.5 py-2 text-sm font-medium text-white hover:bg-red-800 transition-colors"
            hx-post="/users/suspend/apply" hx-target="#suspend-zone" hx-swap="innerHTML"
            hx-vals='{"email": {{ email | tojson }}, "suspend": "on"}'>Confirm suspend</button>
    <button class="inline-flex items-center rounded-lg border border-sh-gray/60 px-3.5 py-2 text-sm text-sh-blueink hover:bg-paper transition-colors"
            hx-get="/users/suspend/zone?email={{ email | urlencode }}&suspended=false" hx-target="#suspend-zone" hx-swap="innerHTML">Cancel</button>
  </div>
</div>
