{% if output.strip() %}
<div class="rounded-2xl border border-brand-gray/40 bg-brand-white p-3 shadow-sm">
  <p class="mb-2 text-xs text-brand-gray"><code>{{ gam }}</code></p>
  <pre class="max-h-96 overflow-auto whitespace-pre-wrap break-all rounded bg-paper p-2 text-xs text-brand-black">{{ output }}</pre>
</div>
{% else %}
<p class="text-sm text-brand-gray">No output. <code>{{ gam }}</code></p>
{% endif %}
